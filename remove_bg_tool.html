<!DOCTYPE html>
<html>
<body>
    <canvas id="canvas"></canvas>
    <script>
        const img = new Image();
        // Load asset via Vite local server
        img.src = "http://localhost:5173/src/assets/logo_source.png";
        img.crossOrigin = "anonymous";
        
        img.onload = () => {
            const canvas = document.getElementById('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = img.width;
            canvas.height = img.height;
            
            ctx.drawImage(img, 0, 0);
            
            const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data = imgData.data;
            
            for (let i = 0; i < data.length; i += 4) {
                const r = data[i];
                const g = data[i + 1];
                const b = data[i + 2];
                // Remove absolute black or near-black pixels
                const threshold = 18; 
                if (r < threshold && g < threshold && b < threshold) {
                    data[i + 3] = 0; 
                }
            }
            
            ctx.putImageData(imgData, 0, 0);
            const base64 = canvas.toDataURL('image/png');
            console.log("BASE64_OUTPUT_START");
            console.log(base64);
            console.log("BASE64_OUTPUT_END");
            document.body.innerText = "DONE_SAVE_TRIGGER";
        };
    </script>
</body>
</html>
